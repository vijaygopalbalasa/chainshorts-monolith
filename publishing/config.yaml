  catalog:
    en-US:
      name: Chainshorts
      short_description: 60-word Web3 news. Earn $SKR.
      long_description: |-
        Chainshorts is the fastest way to stay on top of Web3 — every story from 26+ top crypto sources condensed to exactly 60 words. No fluff, no paywalls, no information overload. Just the signal.

        Browse the live news feed by category, search any topic, and bookmark stories to read later — no wallet required to start.

        Connect your Seeker wallet to unlock the full experience. Stake $SKR tokens on live YES/NO prediction markets tied to real crypto events. Track your open and resolved stakes in the Portfolio tab. Claim your winnings after the 48-hour settlement window, or exit any open stake early with a small penalty.

        Climb the Leaderboard sorted by profit, win rate, or volume — across all time, this week, or this month. See your rank highlighted inline alongside the top performers.

        Swap SOL, USDC, USDT, or $SKR directly inside the app via Jupiter — no need to leave Chainshorts to manage your tokens.

        The $SKR tier system gates exclusive features: Signal tier at 100 SKR, Alpha tier at 500 SKR, Pro tier at 2000 SKR. Hold more $SKR to unlock deeper access.
      new_in_version: Full prediction market system — stake $SKR on live YES/NO markets, track open and resolved positions in the Portfolio tab, and claim payouts after the 48-hour settlement window. Early cashout available with a small penalty. Dispute system to challenge incorrect outcomes with a 50 $SKR deposit and 48-hour challenge window. Leaderboard with profit, win rate, and volume sorting across all time, this week, or this month. Jupiter in-app swap for SOL, USDC, USDT, and $SKR. Wallet-native reactions with Ed25519 signatures.
      saga_features: All wallet interactions are handled through Mobile Wallet Adapter with Seed Vault — private keys never leave the secure enclave. Sign-In With Solana (SIWS) authenticates using an Ed25519 signature with no password or seed phrase exposure. Every on-chain action — SKR staking, early cashout, payout claim, dispute deposit, and Jupiter swap — is signed through MWA with Seed Vault on the Seeker device.
