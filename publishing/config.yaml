solana_mobile_dapp_publisher_portal:
  google_store_package: com.chainshorts.app
  testing_instructions: |-
    1. Open the app — the news feed loads immediately with no login required. Browse 60-word news cards, filter by category (DeFi, NFTs, Markets, etc.), or use the search bar.
    2. Swipe right on any card to bookmark it. Tap the Saved tab to view your bookmarks.
    3. Tap the Wallet tab, then Connect Wallet. Sign in using Seed Vault via Mobile Wallet Adapter. Your $SKR balance and tier will display once connected.
    4. Tap the Predict tab to view live YES/NO prediction markets. Tap any market, enter an SKR amount, and tap Stake YES or Stake NO. The transaction is signed via Seed Vault.
    5. Tap the Portfolio tab to view your open stakes and resolved positions.
    6. On a resolved stake that has passed the 48-hour settlement window, tap Claim Payout to receive SKR — signed via Seed Vault.
    7. To test early cashout, tap Cash Out on an active stake. A 5% penalty applies and a minimum of 10 SKR is required.
    8. Tap the Wallet tab then Swap to test Jupiter. Select input and output tokens (SOL, USDC, USDT, or SKR), review the quote, and confirm via Seed Vault.
    9. Tap the Leaderboard tab to view rankings by profit, win rate, or volume. Your own wallet row is highlighted inline.
